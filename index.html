<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập HTML cơ bản</title>
    <style>
        h1 {
            color: red;
            text-align: center;
        }
        h2 {
            color: lightblue;
        }
        body {
            background-color: grey;
        }
        .phongtrang {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Trang web đầu tiên của tôi</h1>
    </header>

    <main>
        <section>
            <h2>Danh sách việc cần làm</h2>
            <ul class="phongtrang">
                <li>Học HTML cơ bản</li>
                <li>Tìm hiểu về thẻ ngữ nghĩa</li>
                <li>Tạo trang web đơn giản</li>
            </ul>
        </section>

        <section class="phongtrang">
            <h2>Bộ sưu tập hình ảnh</h2>
            <img src="https://via.placeholder.com/200x150" alt="Hình minh họa 1">
            <img src="https://via.placeholder.com/200x150" alt="Hình minh họa 2">
            <img src="https://via.placeholder.com/200x150" alt="Hình minh họa 3">
        </section>

        <section  class="phongtrang">
            <h2>Tài nguyên tham khảo</h2>
            <p>Xem thêm tài liệu tại 
                <a href="https://developer.mozilla.org/vi/docs/Web/HTML" target="_blank">
                    MDN Web Docs
                </a>.
            </p> 
        </section>
    </main>

    <footer style="color: red;">
        <p>&copy; 2026 - Bài tập HTML cơ bản</p>
    </footer>
</body>
</html>
